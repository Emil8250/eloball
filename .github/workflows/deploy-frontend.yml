name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches:
      - master

env:
  NODE_VERSION: 20
  FRONTEND_PATH: ./src/frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_PATH }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.FRONTEND_PATH }}
        run: npm ci

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_PATH }}
        run: npm run build

      - name: Install SWA CLI
        run: npm install -g @azure/static-web-apps-cli

      - name: Deploy to Azure Static Web Apps
        working-directory: ${{ env.FRONTEND_PATH }}
        run: swa deploy --env production --deployment-token $AZURE_STATIC_WEB_APPS_DEPLOYMENT_TOKEN --verbose
        env:
          AZURE_STATIC_WEB_APPS_DEPLOYMENT_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_DEPLOYMENT_TOKEN }}